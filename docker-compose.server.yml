version: "3.3"

services:
  mysql:
    image: mysql:8.0
    container_name: security-agent-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-security_agent_platform}
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - security-agent-mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: security-agent-backend
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-security_agent_platform}
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      TZ: Asia/Shanghai
    ports:
      - "30010:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://106.52.183.228:30010/api}
    container_name: security-agent-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "30009:80"

volumes:
  security-agent-mysql-data:
